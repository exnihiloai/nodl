# EncryptedDisk (active_storage_encryption gem) encrypts every blob at rest with
# a per-blob key (stored encrypted on the blob). `private_url_policy: stream`
# serves decrypted bytes through the mounted engine controller, preserving HTTP
# Range requests so audio playback/seek keeps working. Set at the service level
# so all attachments (audio + example files) are encrypted by default.
test:
  service: EncryptedDisk
  private_url_policy: stream
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: EncryptedDisk
  private_url_policy: stream
  root: <%= Rails.root.join("storage") %>

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

