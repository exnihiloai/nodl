# German translation. Mirrors every key in en.yml. Tone: informal ("du"),
# modern SaaS voice; common anglicisms (Dashboard, Login, Workspace, Checkout,
# Upload, Demo, Status) are kept intentionally.
#
# This file also carries the framework-level German data (validation errors,
# date/time formats, relative time) because the app does not bundle rails-i18n.
de:
