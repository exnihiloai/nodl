  pages:
    integrity_proof:
      title: Integritätsnachweis - Nodl
      meta_description: Wie Nodl Originalaufnahmen mit Fingerabdruck und vertrauenswürdigem Zeitstempel absichert.
      heading: Integritätsnachweis für Aufnahmen
      intro: Ein Integritätsnachweis hilft dir zu zeigen, dass eine Originalaufnahme zu einem bestimmten Zeitpunkt existiert hat und seitdem nicht verändert wurde.
      back_link: Zurück
      proof_summary:
        heading: Das beweist Nodl
        unchanged:
          title: Die Datei wurde seit der Aufnahme nicht verändert
          body: Nodl speichert einen digitalen Fingerabdruck der Originaldatei. Jede Änderung würde sofort auffallen.
        exists_since:
          title: Die Aufnahme existiert seit dem Zeitstempel-Datum unverändert
          body: Ein unabhängiger Dienst bestätigt den Zeitpunkt. Das Datum steht im Zertifikat deines Integritätsarchivs.
      disclaimer:
        heading: Wichtig zu wissen
        body: Der Nachweis ist ein technischer Integritätsnachweis, keine Rechtsberatung und keine Garantie für einen bestimmten Streitfall.
      sections:
        what:
          heading: Was das ist
          body: Wenn diese Funktion für dein Konto aktiviert ist, erstellt Nodl für neue Aufnahmen ein manipulationssicheres Archiv. Das Archiv enthält die Originalaufnahme und eine kleine Zertifikatsdatei mit den Angaben, die später zur Prüfung nötig sind.
        how:
          heading: So funktioniert es
          step_1: Nodl berechnet einen digitalen Fingerabdruck der Originalaufnahme. Schon eine winzige Änderung würde einen anderen Fingerabdruck erzeugen.
          step_2: Nodl sendet nur diesen Fingerabdruck an einen unabhängigen vertrauenswürdigen Zeitstempel-Service. Die Aufnahme selbst bleibt in Nodl.
          step_3: Der Zeitstempel-Service signiert den Fingerabdruck und gibt einen Nachweis zurück, der zur Aufnahme gespeichert wird.
        archive:
          heading: Was im Archiv enthalten ist
          body: Das ZIP-Archiv enthält die Originalaufnahme und ein Integritätszertifikat im JSON-Format. Das Zertifikat enthält Fingerabdruck, Zeitstempel-Service, signierten Nachweis und ob die beigelegte Aufnahme noch zum gespeicherten Fingerabdruck passt.
        verify:
          heading: Wie geprüft werden kann
          body: Du kannst den Nachweis unabhängig von Nodl prüfen, mit der Audiodatei und dem JSON-Zertifikat aus dem Integritätsarchiv. Die Schritte unten richten sich an technisch versierte Prüferinnen und Prüfer.
        technical:
          heading: Technische Prüfung Schritt für Schritt
          intro: "Das Integritätsarchiv (ZIP) enthält die Original-Audiodatei und die Datei integrity-certificate.json. Zusammen erlauben sie zwei Prüfungen: ob die Datei unverändert ist und ob ein unabhängiger Dienst den Fingerabdruck zu einem bestimmten Zeitpunkt bestätigt hat."
          audience_callout:
            heading: Für technisch versierte Nutzer
            body: Diese Anleitung richtet sich an Personen mit technischem Hintergrund, die den Nachweis selbst prüfen und eine Beweisführung gegenüber Dritten erbringen möchten.
          steps:
            prepare:
              title: Archiv entpacken
              body: Entpacke das ZIP. Du findest die Original-Audiodatei (Dateiname steht in original_filename) und integrity-certificate.json.
            hash:
              title: Fingerabdruck der Audiodatei prüfen
              body: Berechne SHA-256 über die Audiodatei und vergleiche den Wert mit integrity_hash_sha256 im Zertifikat. Stimmen beide überein, ist die Datei unverändert. Das Feld integrity_hash_matches_exported_file sollte true sein. Nodl führt diese Prüfung beim Export bereits durch. Ist es false, passt die beigelegte Datei nicht zum gespeicherten Fingerabdruck.
            proof:
              title: Zeitstempel-Nachweis extrahieren
              body: integrity_tsa_proof_blob enthält den RFC-3161-Zeitstempel als Base64-Text. Dekodiere ihn in eine .tsr-Datei, um den Nachweis anzuzeigen oder kryptografisch zu prüfen.
            timestamp:
              title: Zeitstempel kryptografisch prüfen
              body: Mit OpenSSL kannst du den Zeitstempel anzeigen und gegen die Zertifikatskette des in integrity_tsa_authority genannten Dienstes prüfen. Die nötigen CA-Dateien stellst du beim jeweiligen Zeitstempel-Anbieter bereit (z. B. freetsa.org).
          fields:
            heading: Wichtige Felder in integrity-certificate.json
            items:
              original_filename: Dateiname der beigelegten Original-Audiodatei im Archiv.
              integrity_hash_sha256: SHA-256-Fingerabdruck der Originaldatei, zum direkten Vergleich mit deiner Berechnung.
              integrity_hash_algorithm: Hash-Verfahren (derzeit sha256).
              integrity_tsa_timestamp: Zeitpunkt des vertrauenswürdigen Zeitstempels in UTC.
              integrity_tsa_authority: Hostname des unabhängigen Zeitstempel-Dienstes.
              integrity_tsa_proof_blob: Base64-kodierter RFC-3161-Zeitstempel-Nachweis.
              integrity_hash_matches_exported_file: true, wenn die beigelegte Audiodatei zum gespeicherten Fingerabdruck passt; false bei Abweichung.
          commands:
            heading: Beispiel-Befehle
            note: Ersetze original-call.mp3 durch den tatsächlichen Dateinamen aus deinem Archiv. Für die kryptografische Zeitstempel-Prüfung brauchst du die CA-Zertifikate des genannten Zeitstempel-Anbieters.
            example: |
              # 1) Fingerabdruck der Audiodatei berechnen
              shasum -a 256 original-call.mp3

              # 2) Mit Wert aus integrity_hash_sha256 im Zertifikat vergleichen
              jq -r '.integrity_hash_sha256' integrity-certificate.json

              # 3) Zeitstempel-Nachweis aus dem Zertifikat extrahieren
              jq -r '.integrity_tsa_proof_blob' integrity-certificate.json | base64 --decode > proof.tsr

              # 4) Nachweis anzeigen
              openssl ts -reply -in proof.tsr -text

              # 5) Zeitstempel kryptografisch prüfen (CA-Dateien vom Anbieter)
              openssl ts -verify -data original-call.mp3 -in proof.tsr -CAfile tsa-root.pem -untrusted tsa-intermediates.pem
