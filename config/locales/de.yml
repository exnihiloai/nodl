      heading: Open-Source-Lizenzen
      intro: Nodl wird mit Open-Source-Software erstellt. Wir danken den Maintainern und Mitwirkenden der unten aufgeführten Projekte. Diese Seite gibt die Urheberrechtshinweise und Lizenztexte wieder, deren Lizenzen dies von uns verlangen.
      scope_note: Aufgeführt sind die als Teil von Nodl verbreiteten Komponenten von Drittanbietern, etwa Bibliotheken, Schriftarten, Icons und Styles, gruppiert nach Lizenz. Betriebssystemkomponenten und reine Entwicklungswerkzeuge sind nicht enthalten. Eine vollständige Übersicht pflegt das Nodl-Team in der Projektdokumentation.
