  pages:
    integrity_proof:
      title: Integrity proof - Nodl
      meta_description: How Nodl's integrity proof protects original recordings with a fingerprint and trusted timestamp.
      heading: Integrity proof for recordings
      intro: An integrity proof helps you show that an original recording existed at a specific time and has not changed since.
      back_link: Back
      proof_summary:
        heading: What Nodl proves
        unchanged:
          title: The file has not been changed since the recording was made
          body: Nodl stores a digital fingerprint of the original file. Any change would be detected immediately.
        exists_since:
          title: The recording has existed unchanged since the timestamp date
          body: An independent service confirms the point in time. You will find the date in your integrity archive certificate.
      disclaimer:
        heading: Good to know
        body: This is a technical integrity proof, not legal advice and not a guarantee for any specific dispute.
      sections:
        what:
          heading: What it is
          body: When this feature is enabled for your account, Nodl creates a tamper-evident archive for new recordings. The archive contains the original recording and a small certificate file with the details needed to check it later.
        how:
          heading: How it works
          step_1: Nodl calculates a digital fingerprint of the original recording. Even a tiny change would create a different fingerprint.
          step_2: Nodl sends only that fingerprint to an independent trusted timestamp service. The recording itself stays in Nodl.
          step_3: The timestamp service signs the fingerprint and returns a proof that is saved with your recording.
        archive:
          heading: What the archive contains
          body: The ZIP archive contains the original recording and an integrity certificate in JSON format. The certificate lists the fingerprint, timestamp service, signed proof, and whether the bundled recording still matches the stored fingerprint.
        verify:
          heading: How it can be checked
          body: You can verify the proof independently of Nodl, using the audio file and the JSON certificate from the integrity archive. The steps below are for technically minded reviewers.
        technical:
          heading: Technical verification step by step
          intro: "The integrity archive (ZIP) contains the original audio file and integrity-certificate.json. Together they support two checks: whether the file is unchanged and whether an independent service confirmed the fingerprint at a specific point in time."
          audience_callout:
            heading: For technically minded users
            body: This guide is for people with a technical background who want to verify the proof themselves and present evidence to third parties.
          steps:
            prepare:
              title: Extract the archive
              body: Unzip the archive. You will find the original audio file (see original_filename) and integrity-certificate.json.
            hash:
              title: Verify the audio fingerprint
              body: Calculate SHA-256 over the audio file and compare the result with integrity_hash_sha256 in the certificate. If they match, the file is unchanged. The field integrity_hash_matches_exported_file should be true. Nodl already performs this check when creating the export. If it is false, the bundled file does not match the stored fingerprint.
            proof:
              title: Extract the timestamp proof
              body: integrity_tsa_proof_blob contains the RFC 3161 timestamp as Base64 text. Decode it into a .tsr file to inspect or cryptographically verify the proof.
            timestamp:
              title: Verify the timestamp cryptographically
              body: With OpenSSL you can display the timestamp and verify it against the certificate chain of the service named in integrity_tsa_authority. Download the required CA files from that timestamp provider (for example freetsa.org).
          fields:
            heading: Important fields in integrity-certificate.json
            items:
              original_filename: Filename of the bundled original audio file in the archive.
              integrity_hash_sha256: SHA-256 fingerprint of the original file, for direct comparison with your own calculation.
              integrity_hash_algorithm: Hash algorithm used (currently sha256).
              integrity_tsa_timestamp: Trusted timestamp time in UTC.
              integrity_tsa_authority: Hostname of the independent timestamp service.
              integrity_tsa_proof_blob: Base64-encoded RFC 3161 timestamp proof.
              integrity_hash_matches_exported_file: true if the bundled audio matches the stored fingerprint; false if it differs.
          commands:
            heading: Example commands
            note: Replace original-call.mp3 with the actual filename from your archive. Cryptographic timestamp verification requires CA certificates from the named timestamp provider.
            example: |
              # 1) Calculate the audio fingerprint
              shasum -a 256 original-call.mp3

              # 2) Compare with integrity_hash_sha256 from the certificate
              jq -r '.integrity_hash_sha256' integrity-certificate.json

              # 3) Extract the timestamp proof from the certificate
              jq -r '.integrity_tsa_proof_blob' integrity-certificate.json | base64 --decode > proof.tsr

              # 4) Display the proof
              openssl ts -reply -in proof.tsr -text

              # 5) Verify the timestamp cryptographically (CA files from the provider)
              openssl ts -verify -data original-call.mp3 -in proof.tsr -CAfile tsa-root.pem -untrusted tsa-intermediates.pem
